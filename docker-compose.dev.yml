# ============================================
# Agent 사용량 집계 시스템 - Dev/QA 서버
# 프로덕션과 동일 DB/Redis 공유, 별도 포트(8095)로 운영
# ============================================
#
# 사용법:
#   ./deploy.sh dev          Dev 서버 빌드 + 시작
#   ./deploy.sh dev-stop     Dev 서버 중지
#   ./deploy.sh dev-status   Dev 서버 상태 확인
#
# 프로덕션(8090)과 완전 독립 운영, DB/Redis만 공유
# Dev 서버 포트: 8095 (DEV_PORT 환경변수로 변경 가능)

x-timezone: &timezone
  TZ: Asia/Seoul

x-proxy-env: &proxy-env
  <<: *timezone
  HTTP_PROXY: "${HTTP_PROXY:-}"
  HTTPS_PROXY: "${HTTPS_PROXY:-}"
  NO_PROXY: "${NO_PROXY:-localhost,127.0.0.1,.samsungds.net,postgres,redis,api-dev,dashboard-dev,nginx-dev}"
  http_proxy: "${HTTP_PROXY:-}"
  https_proxy: "${HTTPS_PROXY:-}"
  no_proxy: "${NO_PROXY:-localhost,127.0.0.1,.samsungds.net,postgres,redis,api-dev,dashboard-dev,nginx-dev}"
  NODE_TLS_REJECT_UNAUTHORIZED: "${NODE_TLS_REJECT_UNAUTHORIZED:-0}"

services:
  # ─── Dev API Server ───
  # 프로덕션과 동일 빌드, 동일 DB 연결
  # prisma db push 차단 — entrypoint-dev.sh가 스키마 변경 감지 + 경고
  # Redis DB 15번 사용 (프로덕션 DB 0과 캐시 분리, 1~14는 프로덕션 캐시 확장용)
  api-dev:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
      args:
        <<: *proxy-env
    container_name: agent-registry-api-dev
    restart: unless-stopped
    entrypoint: ["sh", "/app/entrypoint-dev.sh"]
    command: []
    environment:
      <<: *proxy-env
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-agent_stats}:${POSTGRES_PASSWORD:-agent_stats_2026!}@postgres:5432/${POSTGRES_DB:-agent_stats}?connection_limit=1000&pool_timeout=30
      REDIS_URL: redis://redis:6379/15
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-in-production}
      SSO_CERT_PATH: /app/cert/cert.cer
      DEVELOPERS: ${DEVELOPERS:-syngha.han,young87.kim,byeongju.lee}
      KNOX_API_URL: ${KNOX_API_URL:-https://openapi.samsung.net/employee/api/v2.0}
      KNOX_SYSTEM_ID: ${KNOX_SYSTEM_ID:-}
      KNOX_AUTH_TOKEN: ${KNOX_AUTH_TOKEN:-}
      KNOX_COMPANY_CODE: ${KNOX_COMPANY_CODE:-C10}
      PORT: ${API_PORT:-3000}
    volumes:
      - ./cert:/app/cert:ro
      - generated_images:/app/generated-images
      - ./packages/api/entrypoint-dev.sh:/app/entrypoint-dev.sh:ro
    expose:
      - "3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const h=require('http');h.get('http://localhost:3000/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      start_period: 30s
      retries: 3

  # ─── Dev React Dashboard ───
  # 프로덕션과 동일 빌드
  dashboard-dev:
    build:
      context: ./packages/dashboard
      dockerfile: Dockerfile
      args:
        <<: *proxy-env
        VITE_AUTH_MODE: oidc
        VITE_OIDC_ISSUER: ${OIDC_ISSUER:-http://a2g.samsungds.net:8090}
        VITE_OIDC_CLIENT_ID: agent-dashboard
    container_name: agent-registry-frontend-dev
    restart: unless-stopped
    environment:
      <<: *proxy-env
      VITE_API_URL: /api
    expose:
      - "80"

  # ─── Dev Nginx Reverse Proxy ───
  # 프로덕션과 동일 nginx, upstream만 dev 서비스로 지정
  nginx-dev:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        <<: *proxy-env
    container_name: agent-registry-proxy-dev
    restart: unless-stopped
    environment:
      <<: *timezone
    ports:
      - "${DEV_PORT:-8095}:8090"
    volumes:
      - ./nginx/upstream-dev.conf:/etc/nginx/conf.d/upstream.conf:ro
    depends_on:
      api-dev:
        condition: service_healthy
      dashboard-dev:
        condition: service_started
