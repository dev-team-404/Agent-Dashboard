# ============================================
# Agent 사용량 집계 시스템 - Docker Compose
# ============================================

x-timezone: &timezone
  TZ: Asia/Seoul

x-proxy-env: &proxy-env
  <<: *timezone
  HTTP_PROXY: "${HTTP_PROXY:-}"
  HTTPS_PROXY: "${HTTPS_PROXY:-}"
  NO_PROXY: "${NO_PROXY:-localhost,127.0.0.1,.samsungds.net,postgres,redis,api,dashboard,nginx}"
  http_proxy: "${HTTP_PROXY:-}"
  https_proxy: "${HTTPS_PROXY:-}"
  no_proxy: "${NO_PROXY:-localhost,127.0.0.1,.samsungds.net,postgres,redis,api,dashboard,nginx}"
  NODE_TLS_REJECT_UNAUTHORIZED: "${NODE_TLS_REJECT_UNAUTHORIZED:-0}"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: agent-stats-db
    restart: unless-stopped
    command: postgres -c max_connections=1000 -c shared_buffers=512MB -c work_mem=8MB -c effective_cache_size=1536MB
    environment:
      <<: *timezone
      POSTGRES_DB: ${POSTGRES_DB:-agent_stats}
      POSTGRES_USER: ${POSTGRES_USER:-agent_stats}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_stats_2026!}
    volumes:
      - agent_stats_postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-8091}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_stats} -d ${POSTGRES_DB:-agent_stats}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: agent-stats-redis
    restart: unless-stopped
    environment:
      <<: *timezone
    command: redis-server --appendonly yes --maxclients 10000
    volumes:
      - agent_stats_redis_data:/data
    ports:
      - "${REDIS_PORT:-8092}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Server
  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
      args:
        <<: *proxy-env
    container_name: agent-stats-api
    restart: unless-stopped
    environment:
      <<: *proxy-env
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-agent_stats}:${POSTGRES_PASSWORD:-agent_stats_2026!}@postgres:5432/${POSTGRES_DB:-agent_stats}?connection_limit=200&pool_timeout=30
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-in-production}
      SSO_CERT_PATH: /app/cert/cert.cer
      DEVELOPERS: ${DEVELOPERS:-syngha.han,young87.kim,byeongju.lee}
      PORT: ${API_PORT:-3000}
    volumes:
      - ./cert:/app/cert:ro
    expose:
      - "3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const h=require('http');h.get('http://localhost:3000/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      start_period: 30s
      retries: 3

  # React Dashboard
  dashboard:
    build:
      context: ./packages/dashboard
      dockerfile: Dockerfile
      args:
        <<: *proxy-env
    container_name: agent-stats-frontend
    restart: unless-stopped
    environment:
      <<: *proxy-env
      VITE_API_URL: /api
    expose:
      - "80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3

  # Nginx Reverse Proxy (includes docs-site build)
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        <<: *proxy-env
    container_name: agent-stats-proxy
    restart: unless-stopped
    environment:
      <<: *timezone
    ports:
      - "${PROXY_PORT:-8090}:8090"
    depends_on:
      api:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/health > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  agent_stats_postgres_data:
  agent_stats_redis_data:
