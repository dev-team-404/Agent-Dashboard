worker_processes auto;

events {
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Performance (1000+ concurrent users)
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50m;

    # Buffer optimization
    proxy_buffer_size 16k;
    proxy_buffers 8 32k;
    proxy_busy_buffers_size 64k;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # API upstream (connection pooling for high concurrency)
    upstream api {
        server api:3000;
        keepalive 256;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    # Dashboard upstream (connection pooling)
    upstream dashboard {
        server dashboard:80;
        keepalive 32;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    server {
        listen 8090;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # API routes
        location /api/ {
            proxy_pass http://api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_next_upstream error timeout http_502;
            proxy_next_upstream_timeout 10s;
            proxy_next_upstream_tries 2;
        }

        # /docs → /docs/ redirect
        location = /docs {
            return 301 /docs/;
        }

        # Documentation (React SPA)
        location /docs/ {
            alias /var/www/docs/;
            index index.html;
            try_files $uri $uri/ /docs/index.html;
        }

        # Vite 빌드 에셋 캐싱 (파일명에 해시 포함 → 장기 캐싱 안전)
        location ~* ^/docs/assets/(.+)$ {
            alias /var/www/docs/assets/$1;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # LLM Proxy routes (OpenAI-compatible, header-based auth)
        location /v1/ {
            proxy_pass http://api/v1/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            # SSE streaming support
            proxy_set_header Connection '';
            proxy_buffering off;
            chunked_transfer_encoding on;
            # Smart retry (not on timeout to avoid duplicate LLM calls)
            proxy_next_upstream error http_502;
            proxy_next_upstream_timeout 10s;
            proxy_next_upstream_tries 2;
        }

        # Dashboard (React SPA)
        location / {
            proxy_pass http://dashboard;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
