# Blue upstream — deploy.sh에 의해 active-upstream.conf로 복사됨
upstream api {
    server api-blue:3000;
    keepalive 256;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

upstream dashboard {
    server dashboard-blue:80;
    keepalive 128;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}
