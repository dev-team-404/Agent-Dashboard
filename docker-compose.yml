# ============================================
# Agent 사용량 집계 시스템 - Docker Compose
# Blue-Green 무중단 배포 지원
# ============================================

x-timezone: &timezone
  TZ: Asia/Seoul

x-proxy-env: &proxy-env
  <<: *timezone
  HTTP_PROXY: "${HTTP_PROXY:-}"
  HTTPS_PROXY: "${HTTPS_PROXY:-}"
  NO_PROXY: "${NO_PROXY:-localhost,127.0.0.1,.samsungds.net,postgres,redis,api-blue,api-green,dashboard-blue,dashboard-green,nginx,auth}"
  http_proxy: "${HTTP_PROXY:-}"
  https_proxy: "${HTTPS_PROXY:-}"
  no_proxy: "${NO_PROXY:-localhost,127.0.0.1,.samsungds.net,postgres,redis,api-blue,api-green,dashboard-blue,dashboard-green,nginx,auth}"
  NODE_TLS_REJECT_UNAUTHORIZED: "${NODE_TLS_REJECT_UNAUTHORIZED:-0}"

# ─── Blue-Green 공통 설정 ───
x-api-common: &api-common
  build:
    context: ./packages/api
    dockerfile: Dockerfile
    args:
      <<: *proxy-env
  restart: unless-stopped
  environment:
    <<: *proxy-env
    NODE_ENV: production
    DATABASE_URL: postgresql://${POSTGRES_USER:-agent_stats}:${POSTGRES_PASSWORD:-agent_stats_2026!}@postgres:5432/${POSTGRES_DB:-agent_stats}?connection_limit=1000&pool_timeout=30
    REDIS_URL: redis://redis:6379
    JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-in-production}
    SSO_CERT_PATH: /app/cert/cert.cer
    DEVELOPERS: ${DEVELOPERS:-syngha.han,young87.kim,byeongju.lee}
    KNOX_API_URL: ${KNOX_API_URL:-https://openapi.samsung.net/employee/api/v2.0}
    KNOX_SYSTEM_ID: ${KNOX_SYSTEM_ID:-}
    KNOX_AUTH_TOKEN: ${KNOX_AUTH_TOKEN:-}
    KNOX_COMPANY_CODE: ${KNOX_COMPANY_CODE:-C10}
    ENABLE_DEV_LOGIN: ${ENABLE_DEV_LOGIN:-}
    PORT: ${API_PORT:-3000}
  volumes:
    - ./cert:/app/cert:ro
    - generated_images:/app/generated-images
  expose:
    - "3000"
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "node", "-e", "const h=require('http');h.get('http://localhost:3000/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
    interval: 10s
    timeout: 3s
    start_period: 30s
    retries: 3

x-dashboard-common: &dashboard-common
  build:
    context: ./packages/dashboard
    dockerfile: Dockerfile
    args:
      <<: *proxy-env
      VITE_DEV_LOGIN: ${ENABLE_DEV_LOGIN:-}
      VITE_AUTH_MODE: oidc
      VITE_OIDC_ISSUER: ${OIDC_ISSUER:-http://a2g.samsungds.net:8090}
      VITE_OIDC_CLIENT_ID: agent-dashboard
  restart: unless-stopped
  environment:
    <<: *proxy-env
    VITE_API_URL: /api
  expose:
    - "80"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: agent-registry-db
    restart: unless-stopped
    command: postgres -c max_connections=2000 -c shared_buffers=4GB -c work_mem=128MB -c effective_cache_size=12GB -c maintenance_work_mem=1GB -c random_page_cost=1.1
    environment:
      <<: *timezone
      POSTGRES_DB: ${POSTGRES_DB:-agent_stats}
      POSTGRES_USER: ${POSTGRES_USER:-agent_stats}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_stats_2026!}
    volumes:
      - agent_stats_postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-8091}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_stats} -d ${POSTGRES_DB:-agent_stats}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: agent-registry-redis
    restart: unless-stopped
    environment:
      <<: *timezone
    command: redis-server --appendonly yes --maxclients 10000
    volumes:
      - agent_stats_redis_data:/data
    ports:
      - "${REDIS_PORT:-8092}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Blue-Green: API Server ───
  api-blue:
    <<: *api-common
    container_name: agent-registry-api-blue

  api-green:
    <<: *api-common
    container_name: agent-registry-api-green

  # ─── Blue-Green: React Dashboard ───
  dashboard-blue:
    <<: *dashboard-common
    container_name: agent-registry-frontend-blue

  dashboard-green:
    <<: *dashboard-common
    container_name: agent-registry-frontend-green

  # Auth Server (OIDC Provider)
  auth:
    build:
      context: ./packages/auth
      dockerfile: Dockerfile
      args:
        <<: *proxy-env
    container_name: agent-registry-auth
    restart: unless-stopped
    environment:
      <<: *proxy-env
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-in-production}
      SSL_ENABLED: "true"
      SSL_CERT_FILE: /app/cert/server.crt
      SSL_KEY_FILE: /app/cert/server.key
      ENABLE_MOCK_SSO: ${ENABLE_MOCK_SSO:-false}
      SSO_ENABLED: ${SSO_ENABLED:-true}
      SSO_CLIENT_ID: ${SSO_CLIENT_ID:-1ce2cced-d8b3-4bcf-887e-eaaa06e8d0f7}
      IDP_ENTITY_ID: ${IDP_ENTITY_ID:-https://stsds.secso.net/adfs/oauth2/authorize/}
      SSO_CERT_FILE: /app/cert/sso.cer
      OIDC_ISSUER: ${OIDC_ISSUER:-http://a2g.samsungds.net:8090}
      OIDC_SSO_CALLBACK_BASE: https://a2g.samsungds.net:9050
      PORT: ${AUTH_PORT:-9050}
    volumes:
      - ./cert:/app/cert:ro
    ports:
      - "${AUTH_PORT:-9050}:9050"
    healthcheck:
      test: ["CMD", "node", "-e", "require('https').get('https://localhost:9050/health',{rejectUnauthorized:false},r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 3

  # Nginx Reverse Proxy (includes docs-site build)
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        <<: *proxy-env
    container_name: agent-registry-proxy
    restart: unless-stopped
    environment:
      <<: *timezone
    ports:
      - "${PROXY_PORT:-8090}:8090"
    volumes:
      - ./nginx/active-upstream.conf:/etc/nginx/conf.d/upstream.conf:ro
    depends_on:
      api-blue:
        condition: service_healthy
      api-green:
        condition: service_healthy
      dashboard-blue:
        condition: service_started
      dashboard-green:
        condition: service_started

volumes:
  agent_stats_postgres_data:
  agent_stats_redis_data:
  generated_images:
