worker_processes auto;

events {
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Performance (1000+ concurrent users)
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50m;

    # Buffer optimization
    proxy_buffer_size 16k;
    proxy_buffers 8 32k;
    proxy_busy_buffers_size 64k;

    # Gzip compression (강화)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml application/wasm font/woff2;

    # Open file cache (정적 파일 성능)
    open_file_cache max=10000 inactive=60s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Blue-Green upstream (볼륨 마운트로 동적 전환)
    include /etc/nginx/conf.d/upstream.conf;

    server {
        listen 8090;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # API routes
        location /api/ {
            proxy_pass http://api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_next_upstream error timeout http_502;
            proxy_next_upstream_timeout 10s;
            proxy_next_upstream_tries 2;
        }

        # Internal API (no auth, internal service communication)
        location /internal/ {
            proxy_pass http://api/internal/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
        }

        # /docs → /docs/ redirect
        location = /docs {
            return 301 /docs/;
        }

        # /docs/ exact — 디렉토리 index 403 방지, index.html 직접 서빙
        location = /docs/ {
            root /var/www/html;
            try_files /docs/index.html =404;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        # Documentation (React SPA) — 정적파일 + SPA 라우팅
        location /docs/ {
            root /var/www/html;
            try_files $uri /docs/index.html;
            # HTML/SPA 엔트리는 항상 최신 버전 강제
            add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            add_header ETag "" always;
        }

        # Vite 빌드 에셋 캐싱 (파일명에 해시 포함 → 장기 캐싱 안전)
        location ~* ^/docs/assets/ {
            root /var/www/html;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        # ASR Audio routes — 대용량 오디오 업로드 + 긴 처리 시간
        location /v1/audio/ {
            proxy_pass http://api/v1/audio/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 600s;
            client_max_body_size 500m;
            proxy_set_header Connection '';
            proxy_buffering off;
            chunked_transfer_encoding on;
            proxy_next_upstream error http_502;
            proxy_next_upstream_timeout 10s;
            proxy_next_upstream_tries 2;
        }

        # LLM Proxy routes (OpenAI-compatible, header-based auth)
        location /v1/ {
            proxy_pass http://api/v1/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 600s;
            client_max_body_size 500m;
            # SSE streaming support
            proxy_set_header Connection '';
            proxy_buffering off;
            chunked_transfer_encoding on;
            # Smart retry (not on timeout to avoid duplicate LLM calls)
            proxy_next_upstream error http_502;
            proxy_next_upstream_timeout 10s;
            proxy_next_upstream_tries 2;
        }

        # OIDC endpoints → Auth Server
        location /oidc/ {
            proxy_pass https://auth:9050/oidc/;
            proxy_ssl_verify off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
        }

        location /.well-known/openid-configuration {
            proxy_pass https://auth:9050/.well-known/openid-configuration;
            proxy_ssl_verify off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
        }

        # SDK 다운로드 → Auth Server
        location /sdk/ {
            proxy_pass https://auth:9050/sdk/;
            proxy_ssl_verify off;
            proxy_http_version 1.1;
        }

        # Auth 대시보드 → Auth Server
        location /auth-dashboard/ {
            proxy_pass https://auth:9050/dashboard/;
            proxy_ssl_verify off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 프레젠테이션 등 정적 HTML (링크 전용, 사이드바 미노출)
        location = /mm-proposal.html {
            root /var/www/html;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        # 로고 파일 — 캐시 비활성화 (리브랜딩 시 즉시 반영)
        location = /logo.png {
            proxy_pass http://dashboard;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        # 정적 파일 장기 캐시 (Vite hash 포함 → immutable)
        location ~* ^/assets/ {
            proxy_pass http://dashboard;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # Dashboard (React SPA)
        location / {
            proxy_pass http://dashboard;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
