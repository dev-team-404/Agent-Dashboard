version: '3.8'

# ============================================
# Agent Dashboard - Docker Compose (v2)
# ============================================

x-timezone: &timezone
  TZ: Asia/Seoul

x-proxy-env: &proxy-env
  <<: *timezone
  HTTP_PROXY: "${HTTP_PROXY:-}"
  HTTPS_PROXY: "${HTTPS_PROXY:-}"
  NO_PROXY: "${NO_PROXY:-localhost,127.0.0.1,.samsungds.net,postgres,redis,api,dashboard,nginx}"
  http_proxy: "${HTTP_PROXY:-}"
  https_proxy: "${HTTPS_PROXY:-}"
  no_proxy: "${NO_PROXY:-localhost,127.0.0.1,.samsungds.net,postgres,redis,api,dashboard,nginx}"
  NODE_TLS_REJECT_UNAUTHORIZED: "${NODE_TLS_REJECT_UNAUTHORIZED:-0}"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: axportal-db
    restart: unless-stopped
    command: postgres -c max_connections=1000 -c shared_buffers=512MB -c work_mem=8MB -c effective_cache_size=1536MB
    environment:
      <<: *timezone
      POSTGRES_DB: ${POSTGRES_DB:-nexuscoder}
      POSTGRES_USER: ${POSTGRES_USER:-nexuscoder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexuscoder123}
    volumes:
      - axportal_postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-8091}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexuscoder} -d ${POSTGRES_DB:-nexuscoder}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: axportal-redis
    restart: unless-stopped
    environment:
      <<: *timezone
    command: redis-server --appendonly yes --maxclients 10000
    volumes:
      - axportal_redis_data:/data
    ports:
      - "${REDIS_PORT:-8092}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Server
  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
      args:
        <<: *proxy-env
    container_name: axportal-api
    restart: unless-stopped
    environment:
      <<: *proxy-env
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-nexuscoder}:${POSTGRES_PASSWORD:-nexuscoder123}@postgres:5432/${POSTGRES_DB:-nexuscoder}?connection_limit=200&pool_timeout=30
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-in-production}
      SSO_CERT_PATH: /app/cert/cert.cer
      DEVELOPERS: ${DEVELOPERS:-syngha.han,young87.kim,byeongju.lee}
      PORT: ${API_PORT:-3000}
    volumes:
      - ./cert:/app/cert:ro
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # React Dashboard
  dashboard:
    build:
      context: ./packages/dashboard
      dockerfile: Dockerfile
      args:
        <<: *proxy-env
    container_name: axportal-frontend
    restart: unless-stopped
    environment:
      <<: *proxy-env
      VITE_API_URL: /api
    expose:
      - "80"
    depends_on:
      - api

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: axportal-proxy
    restart: unless-stopped
    environment:
      <<: *timezone
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docs-site/dist:/var/www/html/docs:ro
    ports:
      - "${PROXY_PORT:-8090}:8090"
    depends_on:
      - api
      - dashboard

volumes:
  axportal_postgres_data:
  axportal_redis_data:
